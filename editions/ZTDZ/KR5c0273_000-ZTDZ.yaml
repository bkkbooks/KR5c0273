body:
  text: 七元圖飛行五星之道以尋歩水木火土金五星來降致神雲羽蓋登太玄之階谷希子法閉氣上罡往還十五過每至星所左手拊心黙祝曰五星列照云云未登罡時先存五星精在五藏中也每歩罡畢輙按而爲之行之十四年白日龍飛要道在尺素上是此之圖矣太上眞人歩五星之道以致五星降室閉氣上罡當先呼五星皇夫人名字畢乃越罡蹈星謂始上罡便頓住呼名字呼名字畢乃越罡蹈星耳若每至星上得復重心呼所至星處之名字益其佳也若其煩重難常但可按舊而行耳昔鬱沙公北里子生長陵老人皆按此法而得昇天不以煩難爲辭也所謂治生者矣商販汲汲豈憚嶮難哉所期唯錢貨而巳耳若使求道者常如賈販之用心亦有何不得仙耶但惜初學者皆言專盡勤至而後輙懈縱有似車之將敗而百節緩落又似負重之牛造逺足蹇末學者之所患而爲得者之所笑皆如此軰事耳苟心研内鏡者是爲感發乎神將有靈人發子之蒙𢹂辰景之輿矣五星布圖常向南也以太白位在西歳星在東按而施之所以爾者五星隱伏縱横無常不如北斗列象恒在故一以定位於五方不得隨星之所在也太素真人曰歩五星初未登星罡之時及訖下罡之時並先存五星之精在我五藏中存畢叩齒五通咽液五過微祝曰五辰列横煥朗五方水星却災木星致昌熒惑消禍太白辟兵鎮星四據我得利貞名刋玉簡録字帝房乗飈扇景飛騰太空出入冥無遊宴十方五雲覆蓋招神攝風役使萬靈上爲仙公畢正心向罡口當上下之際而存祝之也東方歳星眞皇君名澄瀾字清凝夫人名寳容字飛雲南方熒惑真皇君名維渟字散融夫人名華瓶字玄羅中央鎮星真皇君名藏陸字耽延夫人名空瑶字飛賢西方太白真皇君名寥淩字振尋夫人名飈英字靈恩北方辰星真皇君名咸咺字精源夫人名玄華字龍蛾閉氣上罡當先呼五星名字及夫人名字畢乃越罡蹈星先舉兩足上太白從太白登鎮星從鎮登火星從火登木星從木登辰星從辰星還躡太白凡三過乃更閉氣上罡按舊往還十五過每至星所輙呼皇君及夫人名字左手拊心祝曰云云經曰行事時皆北向執隱書而爲之者謂始學眞妙未渉微逺不解星位之首向不識玄斗之指建故當北向執書以漸求之耳若旣解書意識星轉之隨時自宜隨斗所指按而存歩如此則無有常向不爲皆向北也夫一切北向自爲始學者耳恐此將可以意通觸𩔖不足復問耶三八景合二十四神以次念之亦可一時頓存三八亦可平旦存上景日中存中景夜半存下景在人意爲之也若外身幽巖屏絶人事内念神闕攝眞朝氣將可平旦頓存三八景三時又各重存一景益當佳也但人間多事此煩難常行耳事不得常爲益自簿昔西城王君桐栢上眞皆按此道也按苞玄玉籙白簡青經云不存二十四神不知三八景名字者不得爲太平民亦不得爲後聖之臣太素眞人曰欲變化分形隱淪八方匿軀藏景入空造冥來致萬物討捕衆姧當恒修空常之精思也八節日六丁日亦修之若併重日者亦再行之或以歩罡後仍行亦善此隱淪之道也其空常罡上有二十五黒㸃第一㸃地名九常居之以逃形第二㸃名育常化身爲草木萬物第三㸃名卯常變身爲山陵萬物第四㸃名流常逃氣化氣第五㸃名行常逃火第六㸃名上常人見之云上天下地第七㸃名天常逃火第八㸃名玄常逃水第九㸃名三常逃兵第十㸃名辰常逃死第十一㸃中祝處空常心也第十二㸃名河常化作水火第十三㸃名元常住此化作草木第十四㸃名古常住此化作鳥隨心第十五㸃名巳常化形爲鳥獸第十六㸃名九常逃凶第十七㸃名世常逃神第十八㸃名明常逃水成地第十九㸃名玉常住此作虎第二十㸃名法常化身爲千第二十一㸃名隂常住此化作龍第二十二㸃名黄常化爲女子分形爲百第二十三㸃名定常住此化作萬物任心第二十四㸃名飛常逃身爲六畜而人不見第二十五㸃名六常逃鬼殺人歩空常之道始於九常毎造第十一中央星之所而微祝曰四明上元日月氣明流光煥曜二十五星灌液凝魂神水散形蕩穢清練洞徹幽冥玉簡青籙髙閤刻名石鏡玉馬照知鬼形藏身靈緯上朝上清斗第一太清中有變隱逃元内妃名空常法垣字辛正披黄錦帔丹青飛裙第二元星保胎化形内嬪名空常三瓫字羅朱嬰青錦帔緑羽飛裙第三眞星六遯七隱上元元毋名空常靈夷字沖雙兆青錦帔繡羽華裙第四紐星匿景藏光中元内妃名空常七列字横單盤紫錦帔黄華羽裙第五綱星變體易景斗中大女名空常鬱書字疇丘蘭朱錦帔紫青飛裙第六紀星隱迹散象斗中中女名空常氣精字抱定陵朱錦帔青繡飛裙第七關星分景萬形斗中少女名空常郁墨字天凡淑丹錦帔青華羽裙第八帝星化日月水火斗中髙皇左夫人名空常石啓珠字落茂華紫錦帔繡羽飛裙第九尊星化金石山河斗中髙皇右夫人名空常愛上條字靈育玄緑錦帔翠羽華裙九人頭並頽雲髻閉氣上罡先呼九星内妃名字畢乃躡星也太白横懸散芒鋒遂吐三别兩金英圖沸増宇流場玄室皓鬱太白星也横行而懸散於芒鍔縱布於九天者也眞人以此星有七芒常存吐西方三芒引南方兩芒於是金華徹目圖明沸駭以洞一身旣洞得與星神入増宇及流揚之宫宫内有玄室旣晏而遊拜爲眞人也此皆太白星中宫室名也行太上隱書事經曰行事時皆北向執隱書而爲之者謂始學眞妙未渉微逺不解星位之首向不識玄斗之指建故當北向執書以漸求之耳若旣解書意識星轉隨時自宜隨斗所指按而存歩如此則無有常向不爲皆向北也夫一切北向自爲始學者耳恐此將可以意通觸𩔖不足復問耶太上眞人歩五星之道以致五星降室閉氣上罡當先呼五星君皇夫人名字畢乃越罡蹈星謂始上罡便頓住呼名字呼名字畢乃越罡蹈星耳若毎至星上得復重心呼所至星處之名字益其佳也若其煩重難常但可按舊而行耳昔鬱沙公北里子生長陵老人皆按此法而得昇天不以煩難爲辭也所謂治生者矣商販之汲汲豈憚嶮難哉所期唯錢貨而巳耳若使求道者常如賈販之用心亦有何不得仙耶但惜初學者皆言專盡勤至而後輙懈縱有似車之將敗而百節解落又似負重之牛造逺足蹇末學者之所患而爲得者之所笑皆如此軰事耳苟能心研內鏡者是爲感發乎神將有靈人發子之蒙𢹂辰景之輿矣至五星布圖常向南也以太白位在西歳星位在東按而施之所以爾者五星隱伏縱横無常不如北斗列象常在故一以定位於五方不得隨星之所在也三八景合二十四神以次念之亦可一時頓存三八亦可平旦存上景日中存中景夜半存下景在人意爲之也若外身幽巖屏絶人事内念神闕攝眞朝氣將可平旦頓存三八景三時又各重存一景益當佳也但人間多事此煩難常行耳事不得常爲益自薄昔西城王君桐栢上眞皆按此道也按苞玄玉籙白簡青經云不存二十四神不知三八景名字者不得爲太平民亦不得爲後聖之臣受大洞眞經應受上道法衣巾不假人不同器皿者車服床寢不共之也所以遏穢垢之津路防其邪風之往來耳此甚易行而以爲難所謂信道不篤欲飛返沈諸修洞房行歩七元者眠初起初卧時及臨食畢先微祝曰五皇五通玉字洞房回元隱道豁落七晨生魂者玄父變一成神生魄者玄母化二生身攝吾筋骨者公子爲吾精氣者白元長生乆視飛仙十天畢勿令耳聞祝音此太上隱祝以除邪氣致精神欲變化分形隱淪八方匿軀藏景入空造冥來致萬物討捕衆姧當修空常之精思也當一月七歩空常罡如用歩七元日也亦以夜半或以日中或以平旦於靜室行道八節日六丁日亦修之若併重日者亦再行之或以歩畢後仍行亦善此隱淪之要道也其空常罡上有二十五黒㸃第一㸃地名九常居之逃形諱嬰育字通㪍第二㸃名育常化身爲草木萬物煥通字幽元第三㸃名卯常變身爲山陵萬物金上字浩渟第四㸃名流常逃氣化氣谷清字逃迹第五㸃名行常逃火浩兆字玄昇第六㸃名上常人見之云上天下地黄光字元朗第七㸃名天常逃火寥宨字卓度第八㸃名玄常逃水空眺字霞玄第九㸃名三常逃兵騰旻字雲變第十㸃名辰常逃死内溢字益微第十一㸃中祝處空常心也常陽字元元第十二㸃名河常化作水火流精字七轉第十三㸃名元常住此化作草木南治字精極第十四㸃名古常住此化作鳥隨心洞生字微通第十五㸃名巳常化形爲鳥獸李行字後化第十六㸃名九常逃凶青包字上陽第十七㸃名世常逃神蒼元字長明第十八㸃名明常逃水成地碧淵字洞生第十九㸃名玉常住此作虎歸青字玉陽第二十㸃名法常化爲千身緑臺字明曖第二十一㸃名隂常住此化作龍玄通字子元第二十二㸃名黄常化爲女子分形爲百日空字冬宜第二十三㸃名定常住此化作萬物任心隱陽字敷光第二十四㸃名飛常逃身爲六畜而人不見上元字藏光第二十五㸃名六常逃鬼殺之人終變字分圖歩五星初未登星罡之時及訖下罡之時並先存五星之精在我五藏之中存畢叩齒五通咽液五過微祝曰五辰列横煥朗五方水星却災木星致昌熒惑消禍太白辟兵鎮星四據我得利貞名刋玊簡録字帝房乗飈扇景飛騰太空出入冥無遊宴十方五雲覆蓋招神攝風役使萬靈上爲仙公畢正心向罡口當上下之際而存祝也閉氣上罡當先呼五星名字及夫人名字畢乃越罡蹈星先舉兩足上太白從白登鎮星從鎮登火星從火登木星從木登辰星從辰還躡太白凡三過乃更閉氣上罡按舊往還十五過毎至星所輙呼皇君及夫人名字左手拊心心祝曰云云第一太白星黄錦帔丹青飛裙第二元星青錦帔緑羽飛裙第三真星青錦帔繡羽華裙第四紐星紫錦帔黄華羽裙第五綱星朱錦帔紫青飛裙第六紀星朱錦帔青繡飛裙第七關星丹錦帔青華羽裙第八帝星紫錦帔繡羽飛裙第九尊星緑錦帔翠羽華裙頭並頽雲髻歩空常之道始於九常毎造第十一中央星之所而微祝曰四明上元日月氣明流光煥曜二十五星灌液凝魂神水散形蕩穢清練洞徹幽冥玉簡青録髙閣刻名石鏡玉馬照之鬼形藏身靈緯上朝上清東方歳星真君澄瀾清凝夫人寳容飛雲南方熒惑星真君維渟散融夫人華瓶玄羅中央鎮星真皇君藏陸躭延夫人空瑶飛賢西方太白星真皇君寥凌振㝷夫人飈英靈恩北方辰星眞皇君咸咺精源夫人玄華龍娥飛歩空常圖修空常訣要凡欲歩空常飛罡逃形變景飛行玉清當以一月七過行之八節六丁日亦行其道至其日入室燒香左右敷置圖席南向叩齒二十四通閉眼思五星煥明五方良乆來下入己身五藏之中金星入肺宫土星入脾宫火星入心宫木星入肝宫水星入腎宫五星光明洞曜五藏覺體薫熱便思五星皇夫人及二十五㸃空常帝君晨君姓名衣服各在其方都畢微祝曰金木水火土緫氣四元玄精流映光照五明中有五星夫人靈君二十五㸃空常天尊變化形影千合萬分降入五藏結成玉仙練我七魄育我三魂舉形上昇飛入斗門遨戯上都五星齊羣今日玄慶請如所陳引星光氣二十五咽止便起登罡也併足上太白星上閉氣七息向西微祝曰西方七門白氣飛光上有皓帝少陽明皇厥諱寥淩衣服雲裳𧰟精流映煥明金宫號曰五㸃空常之宗席符建節召隂攝陽變化水火七十四方使我飛歩隱景入空駕乗白輿翺翔雲房天地長年永享無窮仰咽七氣止併足鎮星上閉氣十二息向西南仰天而微祝曰中皇四氣緫監八靈玊臺紫房神㸃化生内有元星五帝隱名號曰藏陸安鎮黄庭衣帶飛雲首建華精執符持鉞煥落火鈴使我飛歩告我神名下降脾府鎮神安精上天入雲藏景逃形變化萬物遨遊玉清得與皇君俱保太明引星光十二咽止併足熒惑星上閉氣三息向南微祝曰三門洞曜丹光流精玄氣鬱勃煥映南冥上有赤皇五常明靈厥諱維渟衣錦文精首建寳冠腰玉佩鈴出入朱宫紫房絳城保録我命南宫記生使我飛歩變氣藏形日吉行道普天肅清心神結眞五魂洞明齊光三氣合景火星引星光三咽止併足歳星上閉氣九息向東微祝曰東方九氣青天玉門中有青晨玄上之君流青鬱勃是爲天魂厥諱澄瀾天地髙尊身衣鳳衣斑文虎裙化生五㸃變景九晨頭建青精横天玉冠金符羽節流鈴紛紛手執隱書飛行羽文緫我命録保我身形肝門外映内曜神庭迎我髙登上朝帝晨引星光氣九咽止併足辰星上閉氣五息北向微祝曰五氣北玄玄門洞靈北晨流映魁上玉精中有太皇五帝尊名厥諱咸咺衣服玄青㫖建玉冠腰帶流鈴金章玉節翠佩煥明徘徊華晨傍觀八冥玄津下降入我腎庭保録五神藏腑鮮榮内外充溢變化景形骨飛騰昇上造玉清引星光氣五咽止歩五星畢次登空常罡第一併足上九常上祝曰地九常君變景幽冥爲我隱歩以逃我形次登育常祝曰次登靈君形無常服爲我變化身爲草木次登卯常祝曰卯常尊神能沉能昇爲我化景變成崗陵次登流常祝曰流常皇君形無恒身爲我噏吐與氣起煙次登行常祝曰行常大君威伏萬鬼變化我形起煙成火還金星上閉氣七息叩齒七通祝曰飛空太幽化景五常北入五氣南制三陽金符命靈太帝扶將六戊逃巳保度洞郷太白護肺金鎮胃腸内充外溢形魂俱翔千變萬化適意所迎得與玉皇同遊上京引氣七咽止從金十二歩登土星併足上常祝曰上常翺翔變化億千爲我藏景昇入九天次登天常祝曰天常流炎起煙成壘爲我逃形帶神入火次登玄常祝曰玄常北玄以水爲身隱我河海觀我成眞次登三常祝曰三常變威光制八庭爲我致仙却災禳兵次登辰常祝曰辰常萬化體無常形爲我致仙逃死著生還土星上閉氣十二息叩齒十二通祝曰元帝五皇中皇大神變氣七金成伏三晨逃身分形上天入雲緫呼五靈衛我脾門使我藏府早化成仙飛玄入空水火萬原在所意欲上昇無端得與皇妃結友齊眞引氣十二咽止從土星三歩登火併足空常祝曰空常至靈輔弼上眞入我絳宫緫攝萬仙次登河常祝曰河常逃伏隱道八冥水火變化使我仙成次登元常祝曰元常變化草木蔽身使我形景同合道眞次登古常祝曰古常天𩀱出入無間身生羽翮飛昇上天次登巳常祝曰巳常南離建九雲覆變化我形立成鳥獸還火星上閉氣三息叩齒三通祝曰流炎丹雲三門電庭五常變通萬化鬱溟攝命土皇威制北精上元保録固我長生今日歩空乗虚入星熒惑輔心我道洞明千分萬合所向立成魂導魄練羽服時生得與五皇𢹂輿玉清引氣三咽止從火星九歩登木併足九常祝曰九常青皇天地魂根使我變化逃景隱山次登世常祝曰世常天靈緫度萬仙使我歩空合景成神次登明常祝曰明常照照光矅八眥使我變形逃水成地次登玉常祝曰玉常威化制御五土使我化形立住成虎次登法常祝曰法常部木位緫神仙使我分景化身爲千還木星上閉氣九息叩齒九通祝曰少陽九門徘徊青天中有五常變化億千呼隂召陽制御金神東華命節節應自然歩空躡虚䇿駕青煙上降碧靈下鎮肝門道明九合立致飛仙得與青皇同眞木晨引氣九咽止從木星五歩登水隂常上祝曰隂常北玄萬化之宗使我住此立成神龍次登黄常祝曰黄常隂化化爲仙子使我分形立爲百巳次登定常祝曰定常緫元變化鬱勃使我分形以成萬物次登飛常祝曰飛常緫元入空上下含響百韻化形六畜使人不見次登六常祝曰六常綱紐制鬼御神回轉天地當之殺生還水星上閉氣五息叩齒五通祝曰北玄五氣五門開張中生黒皇號曰五常變化幽冥出隂入陽召命三震制御土宫使我飛歩逃景太空在所適向分形百方上造勾陳昇身玉京體生竒毛腎府納芳今日行道神仙之宗得天上願享祚無窮引氣五咽止歩常都竟便下從門叩齒三十六通向罡歌三洞飛歩章九歩登陽明星併足東向祝曰太上宫中變隱逃元内妃大神太一上尊緫領命籍爲我致仙藏形逃巳上昇帝軒次登隂精東北向祝曰中元宫中保胎化形内嬪太眞髙上玄靈斬胞解結練胎固精變化萬方使我長生次登弼星向眞人祝曰眞元宫中六遯七隱上元元母育我胎産遯化金室變乗蒼輦使我飛空長年無限次登玄冥向北祝曰紐幽宫中匿景藏光内妃神仙大宗靈剛度我六戊出我八方逃跡飛歩上超帝房次登丹元西向祝曰綱神宫中變體易景斗中大女玄化無像度我元斗書名帝傍飛空䇿虚騰身浮影次登北極東北向祝曰紀明宫中隱迹散衆斗中中女靈化上宫落我玄籍度名諸方分身成千反容更童次登天關西北向祝曰關㑹宫中分景萬形斗中少女玄上太靈隨斗運機轉輪萬生使我飛空變化太冥次登輔星向天門叩齒九通祝曰帝席上宫左皇夫人上對帝君齊景合眞號曰空常變化九天運導日月聚氣成煙回轉水火萬怪去身是時元吉玄慶敷陳使我飛歩乗常入眞九晨流落享福萬千形齊天光壽比靈椿仰咽二十四過止次登弼星向地戸叩齒九通祝曰上尊上宫夫人右皇帝尊同符合靈華房天魂地魄號曰上空變化九氣萬眞祖宗回金轉石與天齊功消山竭河呼雲召龍萬怪立應分景億通飛歩躡虚流煥四衝藏身魁席覆衣天光長靈天地享慶洋洋請如所願受福永終仰咽三十六過止太上五星七元空常訣
